version: 0.0
os: linux
files:
  - source: /
    destination: /opt/webapp/current
permissions:
  - object: /opt/webapp/current
    pattern: "**"
    owner: ec2-user
    group: ec2-user
hooks:
  BeforeInstall:
    - location: scripts/stop.sh
      timeout: 60
  AfterInstall:
    - location: scripts/install.sh
      timeout: 300
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 120
